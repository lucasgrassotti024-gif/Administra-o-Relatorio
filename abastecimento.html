<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Abastecimento — Relatórios de Campo</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Outfit:wght@600;800&display=swap" rel="stylesheet">

<style>

:root{
--primary:#2563eb;
--accent:#1d4ed8;
--bg:#f3f6fb;
--card:#ffffff;
--text:#111827;
--muted:#6b7280;
--border:#e5e7eb;
--shadow:0 10px 30px rgba(0,0,0,0.1);
}

.dark{
--bg:#020617;
--card:#020617;
--text:#e5e7eb;
--muted:#9ca3af;
--border:#1e293b;
}

*{
box-sizing:border-box;
font-family:"Inter",sans-serif;
}

body{
margin:0;
background:var(--bg);
color:var(--text);
display:flex;
}

/* SIDEBAR */

.sidebar{
width:230px;
background:var(--card);
position:fixed;
top:0;
bottom:0;
left:0;
padding:14px;
display:flex;
flex-direction:column;
gap:12px;
box-shadow:var(--shadow);
}

.sidebar-title{
font-family:"Outfit";
font-weight:800;
font-size:1rem;
}

.sidebar-sub{
font-size:.72rem;
color:var(--muted);
}

.sidebar-link{
display:flex;
align-items:center;
gap:8px;
padding:8px;
border-radius:10px;
text-decoration:none;
color:var(--text);
font-size:.85rem;
}

.sidebar-link:hover{
background:rgba(37,99,235,0.15);
}

.sidebar-footer{
margin-top:auto;
font-size:.7rem;
color:var(--muted);
border-top:1px solid var(--border);
padding-top:8px;
}

.sidebar-toggle-theme{
border-radius:50%;
width:32px;
height:32px;
border:1px solid var(--border);
cursor:pointer;
background:none;
}

/* MAIN */

.main-wrapper{
margin-left:230px;
flex:1;
padding:20px;
}

.page-title{
font-family:"Outfit";
font-weight:800;
font-size:1.4rem;
}

.page-sub{
font-size:.8rem;
color:var(--muted);
margin-bottom:12px;
}

/* ACTIONS */

.table-actions{
display:flex;
gap:10px;
margin-bottom:12px;
flex-wrap:wrap;
}

button{
padding:6px 12px;
border-radius:999px;
border:1px solid var(--border);
background:var(--card);
font-size:.8rem;
cursor:pointer;
}

button.primary{
background:linear-gradient(135deg,#2563eb,#1d4ed8);
color:white;
border:none;
}

/* TABLE */

.table-wrapper{
background:var(--card);
border-radius:16px;
border:1px solid var(--border);
box-shadow:var(--shadow);
overflow:auto;
}

table{
border-collapse:collapse;
min-width:700px;
width:100%;
}

th,td{
border:1px solid var(--border);
padding:7px 8px;
font-size:.85rem;
}

th{
background:rgba(37,99,235,0.05);
font-weight:700;
}

tbody tr:nth-child(even){
background:rgba(0,0,0,0.02);
}

td[contenteditable]{
background:rgba(37,99,235,0.03);
}

/* IMPORT MODAL */

.import-modal{
position:fixed;
inset:0;
background:rgba(0,0,0,0.6);
display:none;
align-items:center;
justify-content:center;
z-index:999;
}

.import-modal.open{
display:flex;
}

.import-box{
background:var(--card);
border-radius:16px;
padding:18px;
width:90%;
max-width:800px;
display:flex;
flex-direction:column;
gap:10px;
}

.import-box textarea{
width:100%;
height:200px;
border-radius:12px;
border:1px solid var(--border);
padding:10px;
}

</style>
</head>

<body>

<!-- SIDEBAR -->

<aside class="sidebar">

<div>
<div class="sidebar-title">Relatórios de Campo</div>
<div class="sidebar-sub">CMPC • RSS3</div>
</div>

<button id="themeToggle" class="sidebar-toggle-theme">🌙</button>

<a href="admin.html" class="sidebar-link">📋 Admin</a>
<a href="dashboard.html" class="sidebar-link">📊 Dashboard</a>
<a href="planilha.html" class="sidebar-link">📑 Planilha</a>
<a href="oleo-ibcs.html" class="sidebar-link">🛢️ Óleo em IBCs</a>
<a href="abastecimento.html" class="sidebar-link">⛽ Abastecimento</a>
<a href="excluidos.html" class="sidebar-link">🗑️ Excluídos</a>

<div class="sidebar-footer">
Controle de abastecimento
</div>

</aside>

<!-- MAIN -->

<div class="main-wrapper">

<div class="page-title">Controle de Abastecimento</div>
<div class="page-sub" id="subtitleInfo">Carregando dados...</div>

<div class="table-actions">

<button class="primary" id="btnImportExcel">
📥 Importar Excel
</button>

<input id="globalSearch"
placeholder="🔎 Buscar..."
style="padding:6px 12px;border-radius:999px;border:1px solid var(--border);">

</div>

<div class="table-wrapper">

<table>

<thead>
<tr>
<th>Ordem</th>
<th>Data</th>
<th>Placa</th>
<th>Abastecimento (L)</th>
<th>Excluir</th>
</tr>
</thead>

<tbody id="tableBody"></tbody>

</table>

</div>

</div>

<!-- IMPORT MODAL -->

<div id="importModal" class="import-modal">

<div class="import-box">

<h3>Importar dados do Excel</h3>

<textarea id="importTextarea"
placeholder="Cole aqui os dados copiados do Excel (Ctrl+V)..."></textarea>

<button id="analisarImport" class="primary">
Importar
</button>

</div>

</div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<script>

const firebaseConfig = {
apiKey:"AIzaSyCAfBANhkMec6TCGCO9JwrvOB79RbyLw8I",
authDomain:"relatorio-rss3-15896.firebaseapp.com",
projectId:"relatorio-rss3-15896",
storageBucket:"relatorio-rss3-15896.firebasestorage.app",
messagingSenderId:"905086909082",
appId:"1:905086909082:web:7535afa8dddbd7b691fd23"
};

firebase.initializeApp(firebaseConfig);
const db=firebase.firestore();

const tableBody=document.getElementById("tableBody");
const subtitleInfo=document.getElementById("subtitleInfo");

let dados=[];

/* TEMA */

const themeToggle=document.getElementById("themeToggle");

if(localStorage.getItem("tema")==="dark"){
document.body.classList.add("dark");
themeToggle.textContent="☀️";
}

themeToggle.onclick=()=>{
document.body.classList.toggle("dark");
const dark=document.body.classList.contains("dark");
themeToggle.textContent=dark?"☀️":"🌙";
localStorage.setItem("tema",dark?"dark":"light");
};

/* FIREBASE REALTIME */

db.collection("abastecimentos")
.onSnapshot((snap)=>{

dados=[];

snap.forEach(doc=>{
dados.push({id:doc.id,...doc.data()});
});

render();

});

/* RENDER */

function render(){

tableBody.innerHTML="";

dados.forEach(d=>{

const tr=document.createElement("tr");

tr.innerHTML=`
<td contenteditable data="ordem">${d.ordem||""}</td>
<td contenteditable data="data">${d.data||""}</td>
<td contenteditable data="placa">${d.placa||""}</td>
<td contenteditable data="litros">${d.litros||""}</td>
<td><button class="delete">🗑</button></td>
`;

tr.querySelector(".delete").onclick=async()=>{

if(confirm("Excluir abastecimento?")){

await db.collection("abastecimentos").doc(d.id).delete();

}

};

tableBody.appendChild(tr);

});

subtitleInfo.textContent=dados.length+" registro(s)";

}

/* EDITAR */

tableBody.addEventListener("blur",async(e)=>{

const campo=e.target.getAttribute("data");

if(!campo) return;

const tr=e.target.closest("tr");
const index=[...tableBody.children].indexOf(tr);
const id=dados[index].id;

const valor=e.target.textContent.trim();

await db.collection("abastecimentos").doc(id).update({
[campo]:valor
});

},true);


/* BUSCA */

document.getElementById("globalSearch").addEventListener("input",(e)=>{

const termo=e.target.value.toLowerCase();

document.querySelectorAll("#tableBody tr").forEach(tr=>{

const texto=tr.innerText.toLowerCase();

tr.style.display=texto.includes(termo)?"":"none";

});

});


/* IMPORTAÇÃO */

const importModal=document.getElementById("importModal");
const btnImportExcel=document.getElementById("btnImportExcel");
const importTextarea=document.getElementById("importTextarea");
const analisarImport=document.getElementById("analisarImport");

btnImportExcel.onclick=()=>{
importModal.classList.add("open");
};

analisarImport.onclick=async()=>{

const texto=importTextarea.value.trim();

if(!texto){
alert("Cole os dados do Excel.");
return;
}

const linhas=texto.split("\n");

let batch=db.batch();
let count=0;

linhas.forEach(l=>{

const col=l.split("\t");

if(col.length<4) return;

const ref=db.collection("abastecimentos").doc();

batch.set(ref,{
ordem:col[0],
data:col[1],
placa:col[2],
litros:col[3]
});

count++;

});

await batch.commit();

alert(count+" abastecimento(s) importado(s)");

importTextarea.value="";
importModal.classList.remove("open");

};

</script>

</body>
</html>
