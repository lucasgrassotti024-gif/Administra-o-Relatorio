<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Abastecimento — Relatórios de Campo</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Outfit:wght@600;800&display=swap" rel="stylesheet">

<style>

:root{
--primary:#2563eb;
--accent:#1d4ed8;
--bg:#f3f6fb;
--card:#ffffff;
--text:#111827;
--muted:#6b7280;
--border:#e5e7eb;
--shadow:0 10px 30px rgba(0,0,0,0.12);
}

.dark{
--bg:#020617;
--card:#020617;
--text:#e5e7eb;
--border:#1e293b;
--muted:#9ca3af;
}

*{
box-sizing:border-box;
font-family:"Inter";
}

body{
margin:0;
background:var(--bg);
color:var(--text);
display:flex;
min-height:100vh;
}

/* SIDEBAR IGUAL */

.sidebar{
width:230px;
background:var(--card);
display:flex;
flex-direction:column;
padding:14px;
gap:14px;
position:fixed;
top:0;
bottom:0;
left:0;
box-shadow:0 18px 45px rgba(0,0,0,0.35);
}

.sidebar-title{
font-family:"Outfit";
font-weight:800;
font-size:1rem;
}

.sidebar-sub{
font-size:.72rem;
color:var(--muted);
}

.sidebar-link{
display:flex;
align-items:center;
gap:8px;
padding:8px;
border-radius:10px;
text-decoration:none;
font-size:.85rem;
color:var(--text);
}

.sidebar-link:hover{
background:rgba(37,99,235,0.15);
}

.sidebar-footer{
margin-top:auto;
font-size:.7rem;
color:var(--muted);
border-top:1px solid var(--border);
padding-top:8px;
}

.sidebar-toggle-theme{
border:1px solid var(--border);
border-radius:50%;
width:32px;
height:32px;
cursor:pointer;
background:none;
}

/* MAIN */

.main-wrapper{
margin-left:230px;
flex:1;
padding:20px;
}

/* HEADER */

.page-title{
font-family:"Outfit";
font-weight:800;
font-size:1.4rem;
}

.page-sub{
font-size:.8rem;
color:var(--muted);
margin-bottom:10px;
}

/* ACTIONS */

.table-actions{
display:flex;
gap:10px;
margin-bottom:10px;
flex-wrap:wrap;
}

button{
padding:6px 12px;
border-radius:999px;
border:1px solid var(--border);
background:var(--card);
font-size:.8rem;
cursor:pointer;
}

button.primary{
background:linear-gradient(135deg,#2563eb,#1d4ed8);
color:white;
border:none;
}

/* TABLE */

.table-wrapper{
background:var(--card);
border-radius:16px;
border:1px solid var(--border);
box-shadow:var(--shadow);
overflow:auto;
}

table{
border-collapse:collapse;
min-width:700px;
width:100%;
}

th,td{
border:1px solid var(--border);
padding:6px 8px;
font-size:.85rem;
white-space:nowrap;
}

th{
background:rgba(37,99,235,0.05);
font-weight:700;
}

tbody tr:nth-child(even){
background:rgba(0,0,0,0.02);
}

td[contenteditable]{
background:rgba(37,99,235,0.03);
}

</style>
</head>

<body>

<!-- SIDEBAR -->

<aside class="sidebar">

<div>
<div class="sidebar-title">Relatórios de Campo</div>
<div class="sidebar-sub">CMPC • RSS3</div>
</div>

<button id="themeToggle" class="sidebar-toggle-theme">🌙</button>

<nav>

<a href="admin.html" class="sidebar-link">📋 Admin</a>
<a href="dashboard.html" class="sidebar-link">📊 Dashboard</a>
<a href="planilha.html" class="sidebar-link">📑 Planilha</a>
<a href="oleo-ibcs.html" class="sidebar-link">🛢️ Óleo em IBCs</a>
<a href="abastecimento.html" class="sidebar-link">⛽ Abastecimento</a>
<a href="excluidos.html" class="sidebar-link">🗑️ Excluídos</a>

</nav>

<div class="sidebar-footer">
Controle de abastecimento
</div>

</aside>

<!-- MAIN -->

<div class="main-wrapper">

<div class="page-title">Controle de Abastecimento</div>
<div class="page-sub" id="info">Carregando...</div>

<div class="table-actions">

<button class="primary" id="btnImportExcel">
📥 Importar Excel
</button>

<input id="busca" placeholder="🔎 Buscar..."
style="padding:6px 12px;border-radius:999px;border:1px solid var(--border);">

</div>

<div class="table-wrapper">

<table>

<thead>
<tr>
<th>Ordem</th>
<th>Data</th>
<th>Placa</th>
<th>Abastecimento (L)</th>
<th>Excluir</th>
</tr>
</thead>

<tbody id="tbody"></tbody>

</table>

</div>

</div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<script>

const firebaseConfig={
apiKey:"AIzaSyCAfBANhkMec6TCGCO9JwrvOB79RbyLw8I",
authDomain:"relatorio-rss3-15896.firebaseapp.com",
projectId:"relatorio-rss3-15896",
storageBucket:"relatorio-rss3-15896.firebasestorage.app",
messagingSenderId:"905086909082",
appId:"1:905086909082:web:7535afa8dddbd7b691fd23"
};

firebase.initializeApp(firebaseConfig);
const db=firebase.firestore();

const tbody=document.getElementById("tbody");
const info=document.getElementById("info");

let dados=[];

/* TEMA */

const toggle=document.getElementById("themeToggle");

if(localStorage.getItem("tema")==="dark"){
document.body.classList.add("dark");
toggle.textContent="☀️";
}

toggle.onclick=()=>{
document.body.classList.toggle("dark");
const dark=document.body.classList.contains("dark");
toggle.textContent=dark?"☀️":"🌙";
localStorage.setItem("tema",dark?"dark":"light");
};

/* FIREBASE */

db.collection("abastecimentos")
.onSnapshot(snap=>{

dados=[];

snap.forEach(doc=>{
dados.push({id:doc.id,...doc.data()});
});

render();

});

/* RENDER */

function render(){

tbody.innerHTML="";

dados.forEach(d=>{

const tr=document.createElement("tr");

tr.innerHTML=`

<td contenteditable data="ordem">${d.ordem||""}</td>
<td contenteditable data="data">${d.data||""}</td>
<td contenteditable data="placa">${d.placa||""}</td>
<td contenteditable data="litros">${d.litros||""}</td>

<td>
<button style="background:#dc2626;color:white;border:none;border-radius:6px;padding:4px 8px;">🗑</button>
</td>

`;

tr.querySelector("button").onclick=async()=>{

if(confirm("Excluir abastecimento?")){

await db.collection("abastecimentos").doc(d.id).delete();

}

};

tbody.appendChild(tr);

});

info.textContent=dados.length+" registro(s)";

}

/* EDITAR */

tbody.addEventListener("blur",async e=>{

const campo=e.target.getAttribute("data");
if(!campo) return;

const tr=e.target.closest("tr");
const index=[...tbody.children].indexOf(tr);
const id=dados[index].id;

const valor=e.target.textContent.trim();

await db.collection("abastecimentos").doc(id).update({
[campo]:valor
});

},true);

</script>

</body>
</html>
