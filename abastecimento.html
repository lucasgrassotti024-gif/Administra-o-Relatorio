<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Planilha de Abastecimento</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Outfit:wght@600;800&display=swap" rel="stylesheet">

<style>

:root{
--bg:#f3f6fb;
--card:#ffffff;
--text:#111827;
--border:#e5e7eb;
--sidebar-bg:#ffffff;
--sidebar-text:#111827;
}

.dark{
--bg:#020617;
--card:#020617;
--text:#e5e7eb;
--border:#1e293b;
--sidebar-bg:#020617;
--sidebar-text:#e5e7eb;
}

*{
box-sizing:border-box;
font-family:Inter;
}

body{
margin:0;
background:var(--bg);
color:var(--text);
display:flex;
}

/* SIDEBAR */

.sidebar{
width:230px;
background:var(--sidebar-bg);
color:var(--sidebar-text);
display:flex;
flex-direction:column;
padding:14px;
position:fixed;
left:0;
top:0;
bottom:0;
transform:translateX(-100%);
transition:0.25s;
}

body.sidebar-open .sidebar{
transform:translateX(0);
}

.sidebar-header{
display:flex;
justify-content:space-between;
align-items:center;
}

.sidebar-title{
font-family:Outfit;
font-weight:800;
}

.sidebar-link{
padding:8px;
border-radius:10px;
text-decoration:none;
color:inherit;
display:block;
margin-top:4px;
}

.sidebar-link:hover{
background:rgba(37,99,235,0.15);
}

.sidebar-toggle-theme{
width:32px;
height:32px;
border-radius:50%;
border:1px solid var(--border);
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
}

/* BOTÃO MENU */

.sidebar-handle{
position:fixed;
top:14px;
left:10px;
width:32px;
height:32px;
border:none;
border-radius:50%;
background:#2563eb;
color:white;
cursor:pointer;
}

/* MAIN */

.main{
flex:1;
padding:30px;
}

/* TABELA */

table{
border-collapse:collapse;
width:100%;
background:var(--card);
}

th,td{
border:1px solid var(--border);
padding:8px;
}

th{
background:rgba(37,99,235,0.08);
}

td[contenteditable]{
background:rgba(37,99,235,0.04);
}

/* SELEÇÃO */

tr.selected{
background:rgba(37,99,235,0.25);
}

/* BOTÕES */

button{
padding:6px 10px;
border:none;
border-radius:6px;
cursor:pointer;
}

.btn-danger{
background:#dc2626;
color:white;
}

.btn-primary{
background:#2563eb;
color:white;
}

textarea{
width:100%;
height:150px;
margin-top:10px;
}

</style>
</head>

<body>

<aside class="sidebar">

<div class="sidebar-header">
<span class="sidebar-title">Relatórios</span>
<button id="themeToggle" class="sidebar-toggle-theme">🌙</button>
</div>

<nav>
<a href="dashboard.html" class="sidebar-link">📊 Dashboard</a>
<a href="planilha.html" class="sidebar-link">📑 Planilha</a>
<a href="abastecimento.html" class="sidebar-link">⛽ Abastecimento</a>
<a href="excluidos.html" class="sidebar-link">🗑️ Excluídos</a>
</nav>

</aside>

<button id="sidebarHandle" class="sidebar-handle">☰</button>

<div class="main">

<h2>Planilha de Abastecimento</h2>

<button id="btnImport" class="btn-primary">📥 Importar Excel</button>
<button id="btnExcluirSelecionadas" class="btn-danger">🗑️ Excluir Selecionadas</button>

<br><br>

<table>

<thead>
<tr>
<th>Ordem</th>
<th>Data</th>
<th>Placa</th>
<th>Quant. Abastecimento</th>
<th>Excluir</th>
</tr>
</thead>

<tbody id="tbody"></tbody>

</table>

<div id="importArea" style="display:none">

<h3>Colar dados do Excel</h3>

<textarea id="excelPaste"></textarea>

<br><br>

<button id="confirmImport" class="btn-primary">Importar</button>

</div>

</div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<script>

const firebaseConfig={
apiKey:"AIzaSyCAfBANhkMec6TCGCO9JwrvOB79RbyLw8I",
authDomain:"relatorio-rss3-15896.firebaseapp.com",
projectId:"relatorio-rss3-15896"
}

firebase.initializeApp(firebaseConfig)

const db=firebase.firestore()

const tbody=document.getElementById("tbody")

let dados=[]
let selecionados=new Set()

function render(){

tbody.innerHTML=""

dados.forEach(r=>{

const tr=document.createElement("tr")
tr.dataset.id=r.id

if(selecionados.has(r.id)){
tr.classList.add("selected")
}

tr.innerHTML=`

<td contenteditable data-col="ordem">${r.ordem||""}</td>
<td contenteditable data-col="data">${r.data||""}</td>
<td contenteditable data-col="placa">${r.placa||""}</td>
<td contenteditable data-col="quant">${r.quant||""}</td>

<td>
<button class="btn-danger">🗑️</button>
</td>

`

tr.onclick=()=>{

if(selecionados.has(r.id)){
selecionados.delete(r.id)
}else{
selecionados.add(r.id)
}

render()

}

tr.querySelector("button").onclick=async e=>{

e.stopPropagation()

if(!confirm("Excluir linha?"))return

await db.collection("abastecimento")
.doc(r.id)
.delete()

}

tbody.appendChild(tr)

})

}

db.collection("abastecimento")
.onSnapshot(snap=>{

dados=[]

snap.docs.forEach(doc=>{
dados.push({id:doc.id,...doc.data()})
})

render()

})

tbody.addEventListener("blur",async e=>{

if(e.target.tagName!=="TD")return

const tr=e.target.closest("tr")
const id=tr.dataset.id
const col=e.target.dataset.col
const val=e.target.textContent

await db.collection("abastecimento")
.doc(id)
.update({[col]:val})

},true)

/* IMPORTAR EXCEL */

document.getElementById("btnImport").onclick=()=>{
document.getElementById("importArea").style.display="block"
}

document.getElementById("confirmImport").onclick=async()=>{

const texto=document.getElementById("excelPaste").value.trim()

const linhas=texto.split("\n")

let batch=db.batch()

linhas.forEach(l=>{

const c=l.split("\t")

if(c.length<4)return

const ref=db.collection("abastecimento").doc()

batch.set(ref,{
ordem:c[0],
data:c[1],
placa:c[2],
quant:c[3]
})

})

await batch.commit()

alert("Importado!")

}

/* EXCLUIR SELECIONADAS */

document.getElementById("btnExcluirSelecionadas")
.onclick=async()=>{

if(!confirm("Excluir selecionadas?"))return

let batch=db.batch()

selecionados.forEach(id=>{
batch.delete(db.collection("abastecimento").doc(id))
})

await batch.commit()

selecionados.clear()

}

/* SIDEBAR */

document.getElementById("sidebarHandle")
.onclick=()=>{

document.body.classList.toggle("sidebar-open")

}

/* TEMA */

const themeToggle=document.getElementById("themeToggle")

if(localStorage.getItem("tema")==="dark"){

document.body.classList.add("dark")
themeToggle.textContent="☀️"

}

themeToggle.onclick=()=>{

document.body.classList.toggle("dark")

const dark=document.body.classList.contains("dark")

themeToggle.textContent=dark?"☀️":"🌙"

localStorage.setItem("tema",dark?"dark":"light")

}

</script>

</body>
</html>
