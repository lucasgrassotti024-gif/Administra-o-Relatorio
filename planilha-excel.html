<head>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/ag-grid-community/styles/ag-theme-alpine.css"/>
<script src="https://cdn.jsdelivr.net/npm/ag-grid-community/dist/ag-grid-community.min.js"></script>

<style>

/* ===============================
   VARIÁVEIS DE TEMA
================================= */

:root{
  --primary:#2563eb;
  --accent:#1d4ed8;
  --bg:#f3f6fb;
  --card:#ffffff;
  --text:#111827;
  --muted:#6b7280;
  --border:#e5e7eb;
  --shadow-soft:0 10px 30px rgba(15,23,42,0.10);
  --shadow-hard:0 18px 45px rgba(15,23,42,0.20);

  --sidebar-bg:#ffffff;
  --sidebar-text:#111827;
  --sidebar-link:#111827;

  --table-header-bg:rgba(37,99,235,0.06);
  --table-row-alt:rgba(15,23,42,0.02);
}

.dark{
  --bg:#020617;
  --card:#020617;
  --text:#e5e7eb;
  --muted:#9ca3af;
  --border:#1e293b;

  --sidebar-bg:#020617;
  --sidebar-text:#e5e7eb;
  --sidebar-link:#e5e7eb;

  --table-header-bg:rgba(15,23,42,0.92);
  --table-row-alt:rgba(15,23,42,0.45);
}

/* ===============================
   BASE
================================= */

*{
  box-sizing:border-box;
  font-family:"Inter",sans-serif;
  transition:background-color .25s ease,color .25s ease,border-color .25s ease;
}

body{
  margin:0;
  background:var(--bg);
  color:var(--text);
  display:flex;
  min-height:100vh;
}

/* ===============================
   SIDEBAR
================================= */

.sidebar{
  width:230px;
  background:var(--sidebar-bg);
  color:var(--sidebar-text);
  display:flex;
  flex-direction:column;
  padding:14px 12px;
  gap:14px;
  position:fixed;
  inset-block:0;
  left:0;
  z-index:40;
  box-shadow:var(--shadow-hard);
  transform:translateX(-100%);
  transition:transform .25s ease;
}

body.sidebar-open .sidebar{
  transform:translateX(0);
}

.sidebar-header{
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.sidebar-title{
  font-family:"Outfit";
  font-weight:800;
  font-size:1rem;
}

.sidebar-sub{
  font-size:.72rem;
  color:var(--muted);
}

.sidebar-toggle-theme{
  width:32px;
  height:32px;
  border-radius:50%;
  border:1px solid var(--border);
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  background:transparent;
}

.sidebar-nav{
  display:flex;
  flex-direction:column;
  gap:6px;
}

.sidebar-link{
  padding:8px 10px;
  border-radius:10px;
  text-decoration:none;
  color:var(--sidebar-link);
  font-size:.85rem;
}

.sidebar-link:hover,
.sidebar-link.active{
  background:rgba(37,99,235,0.15);
}

/* ===============================
   BOTÃO SIDEBAR
================================= */

.sidebar-handle{
  position:fixed;
  top:14px;
  left:10px;
  z-index:45;
  width:30px;
  height:30px;
  border-radius:999px;
  border:none;
  cursor:pointer;
  background:#2563eb;
  color:#f9fafb;
  font-size:1.1rem;
  box-shadow:0 8px 20px rgba(37,99,235,0.6);
}

/* ===============================
   MAIN
================================= */

.main-wrapper{
  flex:1;
  padding:20px;
  margin-left:0;
  display:flex;
  flex-direction:column;
}

body.sidebar-open .main-wrapper{
  margin-left:230px;
}

.page-title{
  font-family:"Outfit";
  font-weight:800;
  font-size:1.4rem;
}

.page-sub{
  font-size:.8rem;
  color:var(--muted);
  margin-bottom:15px;
}

/* ===============================
   AÇÕES
================================= */

.actions-bar{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  margin-bottom:12px;
}

.actions-bar button{
  padding:6px 12px;
  border-radius:999px;
  border:1px solid var(--border);
  background:var(--card);
  cursor:pointer;
  font-size:.8rem;
}

.actions-bar button.primary{
  background:linear-gradient(135deg,#2563eb,#1d4ed8);
  color:white;
  border:none;
}

/* ===============================
   AG GRID TEMA CUSTOM
================================= */

.ag-theme-alpine{
  --ag-background-color:var(--card);
  --ag-foreground-color:var(--text);
  --ag-border-color:var(--border);
  --ag-header-background-color:var(--table-header-bg);
  --ag-header-foreground-color:var(--text);
  --ag-odd-row-background-color:var(--table-row-alt);
  --ag-row-hover-color:rgba(37,99,235,0.08);
  font-family:"Inter",sans-serif;
}

/* ===============================
   IMPORT MODAL
================================= */

.import-modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.65);
  display:none;
  align-items:center;
  justify-content:center;
  z-index:999;
}

.import-modal.open{
  display:flex;
}

.import-box{
  width:90%;
  max-width:900px;
  background:var(--card);
  border-radius:18px;
  padding:18px;
  box-shadow:var(--shadow-hard);
  display:flex;
  flex-direction:column;
  gap:12px;
}

.import-box textarea{
  width:100%;
  height:200px;
  border-radius:12px;
  border:1px solid var(--border);
  background:var(--bg);
  color:var(--text);
  padding:10px;
  font-size:.8rem;
  resize:vertical;
}

</style>
</head>

<body>

<!-- SIDEBAR -->
<aside class="sidebar">
  <div class="sidebar-header">
    <div>
      <div class="sidebar-title">Relatórios de Campo</div>
      <div class="sidebar-sub">CMPC • RSS3</div>
    </div>
    <button id="themeToggle" class="sidebar-toggle-theme">🌙</button>
  </div>

  <nav class="sidebar-nav">
    <a href="admin.html" class="sidebar-link">📋 Admin</a>
    <a href="dashboard.html" class="sidebar-link">📊 Dashboard</a>
    <a href="planilha-excel.html" class="sidebar-link active">📑 Planilha</a>
    <a href="oleo-ibcs.html" class="sidebar-link">🛢️ Óleo em IBCs</a>
    <a href="excluidos.html" class="sidebar-link">🗑️ Excluídos</a>
    <a href="notificacoes.html" class="sidebar-link">🔔 Notificações</a>
  </nav>
</aside>

<button id="sidebarHandle" class="sidebar-handle">☰</button>

<!-- MAIN -->
<div class="main-wrapper">

  <div class="page-title">Planilha de Relatórios</div>
  <div class="page-sub" id="subtitleInfo">Carregando dados...</div>

  <div class="actions-bar">
    <button id="btnImport" class="primary">📥 Importar Excel</button>
    <button id="btnExport">Exportar CSV</button>
    <input type="text" id="globalSearch"
      placeholder="🔎 Buscar..."
      style="padding:6px 12px;border-radius:999px;border:1px solid var(--border);font-size:.8rem;">
  </div>

  <div id="grid" class="ag-theme-alpine" style="width:100%; height:70vh;"></div>

</div>

<!-- IMPORT MODAL -->
<div id="importModal" class="import-modal">
  <div class="import-box">
    <h3>Importar dados do Excel</h3>
    <textarea id="importTextarea"
      placeholder="Cole aqui as linhas copiadas do Excel..."></textarea>
    <div id="importResult"></div>
    <button id="analisarImport" class="primary">Analisar</button>
  </div>
</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<script>

/* ===============================
   CONFIG FIREBASE
================================= */

const firebaseConfig = {
  apiKey: "AIzaSyCAfBANhkMec6TCGCO9JwrvOB79RbyLw8I",
  authDomain: "relatorio-rss3-15896.firebaseapp.com",
  projectId: "relatorio-rss3-15896",
  storageBucket: "relatorio-rss3-15896.firebasestorage.app",
  messagingSenderId: "905086909082",
  appId: "1:905086909082:web:7535afa8dddbd7b691fd23"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

/* ===============================
   SIDEBAR + TEMA
================================= */

const sidebarHandle = document.getElementById("sidebarHandle");
sidebarHandle.onclick = () => {
  document.body.classList.toggle("sidebar-open");
};

const themeToggle = document.getElementById("themeToggle");
if(localStorage.getItem("tema")==="dark"){
  document.body.classList.add("dark");
  themeToggle.textContent="☀️";
}
themeToggle.onclick=()=>{
  document.body.classList.toggle("dark");
  const dark=document.body.classList.contains("dark");
  themeToggle.textContent=dark?"☀️":"🌙";
  localStorage.setItem("tema",dark?"dark":"light");
};

/* ===============================
   GRID DEFINIÇÃO COMPLETA
================================= */

const gridDiv = document.getElementById("grid");

const columnDefs = [

  { headerName:"Nº PT", field:"numeroPT", filter:'agTextColumnFilter' },
  { headerName:"Data", field:"data", filter:'agTextColumnFilter' },
  { headerName:"Dia Semana", field:"diaSemana", filter:true },
  { headerName:"Equipamento", field:"equipamento", editable:true, filter:true },
  { headerName:"Placa", field:"placa", editable:true, filter:true },
  { headerName:"Local", field:"local", editable:true, filter:true },
  { headerName:"Tag", field:"tag", editable:true, filter:true },
  { headerName:"Solicitante", field:"solicitante", editable:true, filter:true },
  { headerName:"Emitente Abertura", field:"emitenteAbertura", editable:true, filter:true },
  { headerName:"Emitente Encerramento", field:"emitenteEncerramento", editable:true, filter:true },
  { headerName:"Operador", field:"operador", editable:true, filter:true },
  { headerName:"Ajudante", field:"ajudante", editable:true, filter:true },
  { headerName:"Tipo Serviço", field:"tipoServico", editable:true, filter:true },
  { headerName:"Tipo Atividade", field:"tipoAtividade", editable:true, filter:true },
  { headerName:"Óleo", field:"oleo", editable:true, filter:true },
  { headerName:"Qtd Óleo", field:"quantidade", editable:true, filter:true },
  { headerName:"Encerramento PT", field:"encerramentoPt", editable:true, filter:true },
  { headerName:"Motivo Não Finalizada", field:"motivoNaoFinalizada", editable:true, filter:true },

  { headerName:"DDS", field:"ddsChecklist", editable:true, filter:true },
  { headerName:"Disposição", field:"disposicao", editable:true, filter:true },
  { headerName:"Chegada", field:"chegada", editable:true, filter:true },
  { headerName:"Liberação PT", field:"liberacaoPT", editable:true, filter:true },
  { headerName:"Início", field:"inicio", editable:true, filter:true },
  { headerName:"Fim", field:"fim", editable:true, filter:true },
  { headerName:"Início Intervalo", field:"inicioIntervalo", editable:true, filter:true },
  { headerName:"Fim Intervalo", field:"fimIntervalo", editable:true, filter:true },
  { headerName:"Troca Turno", field:"trocaTurno", editable:true, filter:true },

  { headerName:"Duração (min)", field:"duracaoMinutos", editable:true, filter:true },

  {
    headerName:"Excluir",
    field:"acao",
    cellRenderer:(params)=>{
      const btn=document.createElement("button");
      btn.innerText="🗑️";
      btn.style.background="#dc2626";
      btn.style.color="white";
      btn.style.border="none";
      btn.style.borderRadius="6px";
      btn.style.padding="4px 8px";
      btn.style.cursor="pointer";

      btn.onclick=async()=>{
        if(!confirm("Excluir este relatório?")) return;
        await db.collection("relatoriosCampo")
          .doc(params.data.id)
          .delete();
      };

      return btn;
    }
  }

];

/* ===============================
   GRID OPTIONS
================================= */

const gridOptions = {
  columnDefs,
  rowData:[],
  defaultColDef:{
    sortable:true,
    filter:true,
    resizable:true
  },
  rowSelection:"multiple",
  enableRangeSelection:true,
  animateRows:true,
  suppressRowClickSelection:false,

  onCellValueChanged:async(event)=>{
    const id = event.data.id;
    const field = event.colDef.field;
    const value = event.newValue;

    let updateObj = {};

    if([
      "ddsChecklist","disposicao","chegada",
      "liberacaoPT","inicio","fim",
      "inicioIntervalo","fimIntervalo","trocaTurno"
    ].includes(field)){
      updateObj["horarios."+field] = value;
    }
    else{
      updateObj[field] = value;
    }

    await db.collection("relatoriosCampo")
      .doc(id)
      .update(updateObj);
  }
};

const gridApi = agGrid.createGrid(gridDiv, gridOptions);

/* ===============================
   BUSCA GLOBAL
================================= */

document.getElementById("globalSearch")
.addEventListener("input",(e)=>{
 gridApi.setQuickFilter(e.target.value);
});

/* ===============================
   EXPORTAR CSV
================================= */

document.getElementById("btnExport")
.onclick=()=>{
  gridApi.exportDataAsCsv();
};

/* ===============================
   REALTIME FIRESTORE
================================= */

db.collection("relatoriosCampo")
.onSnapshot((snapshot)=>{

  const dados=[];

  snapshot.docs.forEach(doc=>{

    const d=doc.data();
    const h=d.horarios||{};
    const e=d.especificacoes||{};

    dados.push({

      id:doc.id,

      numeroPT:d.numeroPT||"",
      data:d.data||"",
      diaSemana:d.diaSemana||"",
      equipamento:d.equipamento||"",
      placa:d.placa||"",
      local:d.local||"",
      tag:d.tag||"",
      solicitante:d.solicitante||"",
      emitenteAbertura:d.emitenteAbertura||"",
      emitenteEncerramento:d.emitenteEncerramento||"",
      operador:d.operador||"",
      ajudante:d.ajudante||"",
      tipoServico:d.tipoServico||e.tipoServico||"",
      tipoAtividade:e.tipoAtividade||d.tipoAtividade||"",
      oleo:e.oleo||d.oleo||"",
      quantidade:e.quantidade||d.quantidade||"",
      encerramentoPt:d.encerramentoPt||"",
      motivoNaoFinalizada:d.motivoNaoFinalizada||"",
      duracaoMinutos:d.duracaoMinutos||"",

      ddsChecklist:h.ddsChecklist||"",
      disposicao:h.disposicao||"",
      chegada:h.chegada||"",
      liberacaoPT:h.liberacaoPT||"",
      inicio:h.inicio||"",
      fim:h.fim||"",
      inicioIntervalo:h.inicioIntervalo||"",
      fimIntervalo:h.fimIntervalo||"",
      trocaTurno:h.trocaTurno||""

    });

  });

  // ORDENAR POR DATA DA ATIVIDADE
  dados.sort((a,b)=>{
    if(!a.data) return 1;
    if(!b.data) return -1;
    const da = new Date(a.data.includes("/") ? a.data.split("/").reverse().join("-") : a.data);
    const dbb = new Date(b.data.includes("/") ? b.data.split("/").reverse().join("-") : b.data);
    return dbb - da;
  });

  gridApi.setRowData(dados);

  document.getElementById("subtitleInfo")
    .textContent = dados.length + " relatório(s) carregado(s)";

});

</script>

<script>

/* ==========================================
   IMPORTAÇÃO PROFISSIONAL COMPLETA
   - Detecta duplicado no lote
   - Detecta duplicado no Firebase
   - Bloqueia PT repetida
   - Importa apenas válidas
========================================== */

const importModal = document.getElementById("importModal");
const btnImport = document.getElementById("btnImport");
const importTextarea = document.getElementById("importTextarea");
const importResult = document.getElementById("importResult");
const analisarImportBtn = document.getElementById("analisarImport");

btnImport.onclick = () => {
  importModal.classList.add("open");
  importTextarea.value = "";
  importResult.innerHTML = "";
};

importModal.addEventListener("click",(e)=>{
  if(e.target === importModal){
    importModal.classList.remove("open");
  }
});

/* ===============================
   HELPERS
================================= */

function converterDataBR(data){
  if(!data) return "";
  if(!data.includes("/")) return data;
  const [d,m,y] = data.split("/");
  return `${y}-${m.padStart(2,"0")}-${d.padStart(2,"0")}`;
}

function normalizarNumeroPT(pt){
  return String(pt || "").trim();
}

/* ===============================
   ANALISAR IMPORTAÇÃO
================================= */

analisarImportBtn.onclick = async () => {

  const texto = importTextarea.value.trim();

  if(!texto){
    alert("Cole os dados do Excel primeiro.");
    return;
  }

  const linhas = texto.split("\n").filter(l => l.trim() !== "");
  const lotePTs = new Set();
  const duplicadosLote = new Set();
  const validos = [];

  // Detectar duplicado dentro do próprio lote
  linhas.forEach(l=>{
    const col = l.split("\t");
    const numeroPT = normalizarNumeroPT(col[3]);

    if(lotePTs.has(numeroPT)){
      duplicadosLote.add(numeroPT);
    } else {
      lotePTs.add(numeroPT);
    }
  });

  // Buscar duplicados no Firebase
  const duplicadosFirebase = new Set();
  const ptsArray = Array.from(lotePTs);

  for(let i=0;i<ptsArray.length;i+=10){

    const bloco = ptsArray.slice(i,i+10);

    const snap = await db.collection("relatoriosCampo")
      .where("numeroPT","in",bloco)
      .get();

    snap.forEach(doc=>{
      duplicadosFirebase.add(doc.data().numeroPT);
    });
  }

  // Processar válidos
  linhas.forEach(l=>{

    const col = l.split("\t");

    const numeroPT = normalizarNumeroPT(col[3]);

    if(duplicadosLote.has(numeroPT)) return;
    if(duplicadosFirebase.has(numeroPT)) return;

    const data = converterDataBR(col[0]);

    const objeto = {

      numeroPT,
      data,
      equipamento: col[1] || "",
      placa: col[2] || "",
      tag: col[13] || "",
      local: col[14] || "",
      tipoServico: col[16] || "",
      solicitante: col[17] || "",
      emitenteAbertura: col[18] || "",
      emitenteEncerramento: col[19] || "",
      ajudante: col[20] || "",
      operador: col[21] || "",
      oleo: col[22] || "",
      tipoAtividade: col[23] || "",
      encerramentoPt: col[25] || "",
      motivoNaoFinalizada: "",
      duracaoMinutos: "",

      horarios:{
        ddsChecklist: col[7] || "",
        disposicao: col[8] || "",
        chegada: col[9] || "",
        inicio: col[10] || "",
        fim: col[11] || "",
        liberacaoPT:"",
        inicioIntervalo:"",
        fimIntervalo:"",
        trocaTurno:""
      },

      criadoEm: firebase.firestore.FieldValue.serverTimestamp()

    };

    validos.push(objeto);

  });

  /* ===============================
     RELATÓRIO VISUAL
  ================================ */

  let html = `
    <b>Resultado da Análise</b><br><br>
    Total linhas: ${linhas.length}<br>
    Válidas: ${validos.length}<br>
    Duplicadas no lote: ${duplicadosLote.size}<br>
    Já existentes no sistema: ${duplicadosFirebase.size}<br><br>
  `;

  if(duplicadosLote.size > 0){
    html += "<b>Duplicadas no lote:</b><br>" +
      Array.from(duplicadosLote).join("<br>") + "<br><br>";
  }

  if(duplicadosFirebase.size > 0){
    html += "<b>Já existentes no sistema:</b><br>" +
      Array.from(duplicadosFirebase).join("<br>") + "<br><br>";
  }

  if(validos.length > 0){
    html += `<button id="confirmarImportacao" style="
      padding:8px 14px;
      border-radius:8px;
      border:none;
      background:#2563eb;
      color:white;
      cursor:pointer;
    ">Importar apenas válidas</button>`;
  } else {
    html += "<b>Nenhum registro válido para importar.</b>";
  }

  importResult.innerHTML = html;

  /* ===============================
     CONFIRMAR IMPORTAÇÃO
  ================================ */

  const btnConfirm = document.getElementById("confirmarImportacao");

  if(btnConfirm){
    btnConfirm.onclick = async ()=>{

      let batch = db.batch();
      let count = 0;

      for(let i=0;i<validos.length;i++){

        const ref = db.collection("relatoriosCampo").doc();
        batch.set(ref, validos[i]);
        count++;

        if(count >= 450){
          await batch.commit();
          batch = db.batch();
          count = 0;
        }
      }

      if(count > 0){
        await batch.commit();
      }

      alert("Importação concluída com sucesso.");

      importModal.classList.remove("open");
      importTextarea.value = "";
      importResult.innerHTML = "";
    };
  }

};

</script>
